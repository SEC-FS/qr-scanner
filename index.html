<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUSHAN QR SCANNER</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 20px; width: 100%; max-width: 400px; }
        .scanner-box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; box-sizing: border-box; }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; background: #000; }
        
        /* Hiệu ứng nút bấm */
        .btn-pulse { 
            background: #1a73e8; color: white; border: none; padding: 15px; width: 100%; 
            border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; 
            margin-top: 15px; display: none; align-items: center; justify-content: center; 
            transition: 0.3s; box-shadow: 0 4px 6px rgba(26, 115, 232, 0.2);
        }
        .btn-pulse:active { transform: scale(0.98); }

        /* Khu vực hiển thị kết quả chi tiết */
        .info-container { text-align: left; background: #f8f9fa; border-radius: 8px; padding: 15px; margin-top: 15px; border: 1px solid #eee; }
        .info-item { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .info-item:last-child { border-bottom: none; }
        .info-label { font-size: 11px; color: #666; font-weight: bold; text-transform: uppercase; }
        .info-value { font-size: 14px; color: #333; font-weight: 600; text-align: right; }
        .id-value { color: #1a73e8; font-family: monospace; }
        
        #status { font-size: 1.1em; font-weight: bold; margin-top: 15px; text-align: center; min-height: 1.2em; }
        #guest-info { text-align: center; color: #666; margin-top: 10px; font-size: 0.9em; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.4s ease-out; }
    </style>
</head>
<body>

<div class="header">
  <h2 style="margin:0; color: #1a73e8; letter-spacing: 1px;">FUSHAN QR SCANNER</h2>
  <p style="margin:5px 0 0; opacity: 0.8; color: #666; font-weight: 500;">Security & Access Control</p>
</div>

<div class="scanner-box">
    <div id="reader"></div>
    
    <div id="status">KHỞI TẠO CAMERA...</div>
    
    <div id="guest-info">
        Vui lòng đưa mã QR vào khung hình
    </div>

    <button class="btn-pulse" id="rescan-btn" onclick="startScanning()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 10px;">
        <path d="M23 4v6h-6"></path>
        <path d="M1 20v-6h6"></path>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
      </svg>
      QUÉT TIẾP THEO
    </button>
</div>

<script>
    // URL Web App của bạn
    const gas_webhook = "https://script.google.com/macros/s/AKfycbxouZfCDTTsjVHbaD1HVTDVs-E6534W0UopZHB1qAsPtA2SWc-04_x_Wt2YyslqAuFHxw/exec";
    let html5QrCode;
    const API_KEY = 'AIzaSyBF1nVvgUYvaOV3kw3AuspMvPFpxLMz6IM';
    const GS_CONFIG = {
        API_KEY: 'AIzaSyBF1nVvgUYvaOV3kw3AuspMvPFpxLMz6IM', // API Key đã khóa theo domain GitHub ở Google Cloud
        SHEET_ID: '1ktrChvVU0AfSwiwzDqyHx_2qpGM5f4oflmMxtcPdbzc', // ID của file chứa hàm IMPORTRANGE
        RANGE: 'Sheet1!A:G' // Vùng dữ liệu ở file trung gian (A, B, C, D, J, X, Z - tổng 7 cột)
    };

    // Tự động kích hoạt khi trang load xong
    window.onload = function() {
        initScanner();
    };

    function initScanner() {
        html5QrCode = new Html5Qrcode("reader");
        const config = { 
            fps: 15, 
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0 
        };

        html5QrCode.start(
            { facingMode: "environment" }, 
            config, 
            onScanSuccess
        ).then(() => {
            updateStatus("SẴN SÀNG QUÉT", "#333");
        }).catch(err => {
            updateStatus("❌ LỖI CAMERA", "#dc3545");
            document.getElementById('guest-info').innerText = "Hãy đảm bảo bạn dùng HTTPS và đã cấp quyền Camera.";
        });
    }

    async function onScanSuccess(decodedText) {
        html5QrCode.pause();
        updateStatus("⌛ Đang kiểm tra hệ thống...", "#007bff");

        const url = `https://sheets.googleapis.com/v4/spreadsheets/${GS_CONFIG.SHEET_ID}/values/${GS_CONFIG.RANGE}?key=${GS_CONFIG.API_KEY}`;

        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error("Lỗi kết nối API");
            
            const data = await response.json();
            const rows = data.values;

            if (!rows || rows.length === 0) {
                showError("Dữ liệu hệ thống trống!");
                return;
            }

            // TÌM KIẾM ID (Giả sử ID nằm ở cột A - row[0])
            // Cấu trúc mảng row: [0:A, 1:B, 2:C, 3:D, 4:J, 5:X, 6:Z]
            const foundRow = rows.find(row => row[0] && row[0].toString().trim() === decodedText.trim());

            if (foundRow) {
                showResult({
                    success: true,
                    id: foundRow[0],
                    name: foundRow[3] || 'N/A',
                    company: foundRow[2] || 'N/A',
                    project: foundRow[4] || 'N/A',
                    activeDate: foundRow[5] || 'N/A', // Đây là cột J từ file gốc
                    approvalTime: foundRow[6] || 'N/A' // Đây là cột Z từ file gốc
                });
            } else {
                showError("Mã QR không tồn tại trong danh sách!");
            }

        } catch (error) {
            console.error(error);
            showError("Lỗi kết nối! Vui lòng kiểm tra API Key/Internet.");
        }
    }

    function showResult(response) {
        const statusEl = document.getElementById('status');
        const infoEl = document.getElementById('guest-info');
        const rescanBtn = document.getElementById('rescan-btn');
        
        updateStatus("✅ CHECKED IN", "#28a745");
        
        infoEl.innerHTML = `
            <div class="info-container animate-in">
                <div class="info-item"><span class="info-label">Guest ID</span><span class="info-value id-value">${response.id}</span></div>
                <div class="info-item"><span class="info-label">Full Name</span><span class="info-value">${response.name}</span></div>
                <div class="info-item"><span class="info-label">Company</span><span class="info-value">${response.company}</span></div>
                <div class="info-item"><span class="info-label">Project</span><span class="info-value">${response.project}</span></div>
                <div class="info-item"><span class="info-label">Active Date (J)</span><span class="info-value">${response.activeDate}</span></div>
                <div class="info-item"><span class="info-label">Note (Z)</span><span class="info-value">${response.approvalTime}</span></div>
            </div>`;
        
        rescanBtn.style.display = 'flex';
    }

    function showError(message) {
        updateStatus("❌ TỪ CHỐI", "#dc3545");
        document.getElementById('guest-info').innerHTML = `<div class="animate-in" style="color:#dc3545; font-weight:bold; margin-top:10px;">${message}</div>`;
        document.getElementById('rescan-btn').style.display = 'flex';
    }

    function startScanning() {
        document.getElementById('rescan-btn').style.display = 'none';
        document.getElementById('guest-info').innerText = "Vui lòng đưa mã QR vào khung hình";
        updateStatus("SẴN SÀNG QUÉT", "#333");
        html5QrCode.resume();
    }

    function updateStatus(text, color) {
        const el = document.getElementById('status');
        el.innerText = text;
        el.style.color = color;
    }
</script>
